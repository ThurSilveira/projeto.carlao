<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Escala Ministerial</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Nunito', sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 99px; }
  input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
  @keyframes fadeIn  { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-8px) } to { opacity: 1; transform: translateX(0) } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#583400",
  "accentColor": "#0F766E",
  "density": "comfortable",
  "darkMode": true
}/*EDITMODE-END*/;

const NAV_ITEMS = [
  { key: 'dashboard', label: 'Painel',    icon: 'dashboard' },
  { key: 'ministros', label: 'Ministros', icon: 'ministers' },
  { key: 'eventos',   label: 'Eventos',   icon: 'events'    },
  { key: 'escalas',   label: 'Escalas',   icon: 'scales'    },
  { key: 'feedback',  label: 'Feedback',  icon: 'feedback'  },
  { key: 'auditoria', label: 'Auditoria', icon: 'audit'     },
];

// ── Bottom Nav ────────────────────────────────────────────────────────────────
function BottomNav({ active, onSelect }) {
  const C = useColors();
  return (
    <nav style={{
      position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 200,
      background: C.surface, borderTop: `1px solid ${C.border}`,
      display: 'flex', height: 72,
      boxShadow: '0 -4px 20px rgba(15,23,42,0.08)',
    }}>
      {NAV_ITEMS.map(item => {
        const isActive = active === item.key;
        return (
          <button key={item.key} onClick={() => onSelect(item.key)} style={{
            flex: 1, display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center', gap: 3,
            background: 'none', border: 'none', cursor: 'pointer', padding: '8px 4px',
          }}>
            <div style={{
              width: 40, height: 28, borderRadius: 99,
              background: isActive ? C.primary + '1A' : 'transparent',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              transition: 'background 0.2s',
            }}>
              <Icon name={item.icon} size={20} color={isActive ? C.primary : C.onSurfaceVariant} />
            </div>
            <span style={{
              fontSize: 10, fontWeight: isActive ? 700 : 500,
              color: isActive ? C.primary : C.onSurfaceVariant,
              fontFamily: "'Nunito', sans-serif", transition: 'color 0.15s',
            }}>{item.label}</span>
          </button>
        );
      })}
    </nav>
  );
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function Sidebar({ active, onSelect }) {
  const C = useColors();
  return (
    <aside style={{
      width: 240, flexShrink: 0, height: '100vh',
      position: 'sticky', top: 0,
      background: C.surface, borderRight: `1px solid ${C.border}`,
      display: 'flex', flexDirection: 'column',
      boxShadow: '2px 0 12px rgba(15,23,42,0.04)',
    }}>
      <div style={{ padding: '28px 20px 24px', borderBottom: `1px solid ${C.border}` }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 36, height: 36, borderRadius: 10, background: C.primary, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="scales" size={20} color="#fff" />
          </div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 800, color: C.onSurface, fontFamily: "'Playfair Display', serif", lineHeight: 1.2 }}>Escala</div>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.onSurfaceVariant, fontFamily: "'Nunito', sans-serif", letterSpacing: '0.08em', textTransform: 'uppercase' }}>Ministerial</div>
          </div>
        </div>
      </div>
      <nav style={{ flex: 1, padding: '12px 12px 0', overflow: 'auto' }}>
        {NAV_ITEMS.map(item => {
          const isActive = active === item.key;
          return (
            <button key={item.key} onClick={() => onSelect(item.key)} style={{
              width: '100%', display: 'flex', alignItems: 'center', gap: 10,
              padding: '10px 12px', borderRadius: 10, marginBottom: 2,
              background: isActive ? C.primary + '14' : 'transparent',
              border: 'none', cursor: 'pointer', textAlign: 'left', transition: 'background 0.15s',
            }}>
              <div style={{
                width: 32, height: 32, borderRadius: 8,
                background: isActive ? C.primary + '22' : 'transparent',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <Icon name={item.icon} size={18} color={isActive ? C.primary : C.onSurfaceVariant} />
              </div>
              <span style={{ fontSize: 14, fontWeight: isActive ? 700 : 500, color: isActive ? C.primary : C.onSurface, fontFamily: "'Nunito', sans-serif" }}>{item.label}</span>
              {isActive && <div style={{ marginLeft: 'auto', width: 6, height: 6, borderRadius: '50%', background: C.primary }} />}
            </button>
          );
        })}
      </nav>
      <div style={{ padding: '16px 20px', borderTop: `1px solid ${C.border}` }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <Avatar nome="Coordenador" size={32} />
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.onSurface, fontFamily: "'Nunito', sans-serif" }}>Coordenador</div>
            <div style={{ fontSize: 11, color: C.onSurfaceVariant, fontFamily: "'Nunito', sans-serif" }}>Paróquia São José</div>
          </div>
        </div>
      </div>
    </aside>
  );
}

// ── Mobile Top Bar ────────────────────────────────────────────────────────────
function MobileTopBar() {
  const C = useColors();
  return (
    <div style={{
      position: 'sticky', top: 0, zIndex: 100,
      background: C.surface, borderBottom: `1px solid ${C.border}`,
      padding: '14px 20px 12px',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      boxShadow: '0 2px 8px rgba(15,23,42,0.06)',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ width: 28, height: 28, borderRadius: 8, background: C.primary, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name="scales" size={16} color="#fff" />
        </div>
        <span style={{ fontSize: 15, fontWeight: 800, color: C.onSurface, fontFamily: "'Playfair Display', serif" }}>Escala Ministerial</span>
      </div>
      <Avatar nome="Coordenador" size={30} />
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = React.useState('dashboard');
  const [data, setData]     = React.useState(window.AppData);
  const [toasts, setToasts] = React.useState([]);
  const [isDesktop, setIsDesktop] = React.useState(window.innerWidth >= 768);
  const [tweaks, setTweak]  = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const h = () => setIsDesktop(window.innerWidth >= 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);

  function showToast(message, type = 'success') {
    const id = Date.now();
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2800);
  }

  // Build theme colors — override primary/secondary from tweaks
  const isDark = tweaks.darkMode;
  const baseColors = isDark ? DARK_COLORS : LIGHT_COLORS;
  const theme = {
    ...baseColors,
    primary: tweaks.primaryColor || baseColors.primary,
    secondary: tweaks.accentColor || baseColors.secondary,
    // Recompute primaryLight from primary for dark/light
    primaryLight: isDark
      ? (tweaks.primaryColor || baseColors.primary) + '28'
      : (tweaks.primaryColor || baseColors.primary) + '18',
  };

  const screenProps = { data, setData, isDesktop, showToast };

  const screenMap = {
    dashboard: <DashboardScreen {...screenProps} onNavigate={setScreen} />,
    ministros: <MinistrosScreen {...screenProps} />,
    eventos:   <EventosScreen   {...screenProps} />,
    escalas:   <EscalasScreen   {...screenProps} />,
    feedback:  <FeedbackScreen  {...screenProps} />,
    auditoria: <AuditoriaScreen {...screenProps} />,
  };

  return (
    <ThemeContext.Provider value={theme}>
      <div style={{ minHeight: '100vh', display: 'flex', background: theme.appBg }}>
        {isDesktop && <Sidebar active={screen} onSelect={setScreen} />}
        <main style={{
          flex: 1, minWidth: 0, overflowY: 'auto', height: '100vh',
          paddingBottom: isDesktop ? 0 : 72,
          animation: 'slideIn 0.2s ease', background: theme.appBg,
        }} key={screen}>
          {!isDesktop && <MobileTopBar />}
          <div style={{ maxWidth: isDesktop ? 800 : 'none', margin: '0 auto' }}>
            {screenMap[screen]}
          </div>
        </main>
        {!isDesktop && <BottomNav active={screen} onSelect={setScreen} />}
        <Toast toasts={toasts} />
        <TweaksPanel>
          <TweakSection label="Identidade Visual" />
          <TweakColor label="Cor Primária"    value={tweaks.primaryColor} onChange={v => setTweak('primaryColor', v)} />
          <TweakColor label="Cor de Destaque" value={tweaks.accentColor}  onChange={v => setTweak('accentColor', v)} />
          <TweakSection label="Interface" />
          <TweakRadio  label="Densidade" value={tweaks.density} options={['comfortable', 'compact']} onChange={v => setTweak('density', v)} />
          <TweakToggle label="Modo escuro" value={tweaks.darkMode} onChange={v => setTweak('darkMode', v)} />
        </TweaksPanel>
      </div>
    </ThemeContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
