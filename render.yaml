services:
  - type: web
    name: escala-ministerial-backend
    env: java
    plan: free
    rootDir: backend
    buildCommand: "mvn clean package -DskipTests"
    startCommand: "java -Dserver.port=$PORT -jar target/escala-ministerial-1.0.0.jar"
    envVars:
      - key: DATABASE_URL
        sync: false                   # definir manualmente no painel do Render
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false                   # ex: https://seu-app.vercel.app
      - key: JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: ENVIRONMENT
        value: production
