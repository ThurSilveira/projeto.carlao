# Server
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# Database - PostgreSQL
# Em produção, DATABASE_URL vem do Supabase (formato: postgresql://user:pass@host:port/db)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:escala_ministerial}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# SSL — obrigatório para Supabase em produção
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSLMODE:prefer}
spring.datasource.hikari.data-source-properties.ssl=${DB_SSL:false}

# Connection Pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate — update cria/atualiza tabelas automaticamente em dev
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging
logging.level.root=${LOGGING_LEVEL:INFO}
logging.level.com.exemplo.escala=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# JWT
jwt.secret=${JWT_SECRET:dev_secret_troque_em_producao_minimo_32_chars!!}
jwt.expiration=${JWT_EXPIRATION:86400}

# CORS — configurado via WebConfig.java
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# Timezone
spring.jpa.properties.hibernate.jdbc.time_zone=${TIMEZONE:America/Sao_Paulo}
